    />

</head>
<body>
    <header>
        <nav class="nav-mobile">
            <a href="/modules/mainModules.html">
                <img src="../images/uppkopplad-logo.svg" alt="uppkoppladLogo" id="logo"/>
            </a>

                <summary></summary>
                <div class="menu">

        </nav>
    </header>

   <form id="credentials-update-form">
        <h3>Uppdatera dina personliga uppgifter</h3>
        <div class="container">
            <label for="username-update">Användarnamn: </label>
            <input type="text" placeholder="Fyll i ditt nya användarnamn" name="username-update" id="username-update"/>
            <span id="error-msg-username"></span>
            <span id="success-msg-username"></span>
            <button type="submit" class="primary-btn-s" id="update-btn">Spara</button>

            <label for="password-update">Lösenord: </label>
            <div class="password-update-field">
                <div>
                <input type="password" placeholder="Fyll i ditt nya lösenord" name="password-update" id="password-update" minlength="8" style="border: none;"/>
                  </div>
                <button type="button" id="toggle-visibility" aria-label="Visa lösenord">
                    <i class="bi bi-eye"></i>
                </button>
            </div>  
            <input type="password" placeholder="Bekräfta ditt nya lösenord" name="passwor-update-repeat" id="password-update-repeat" minlength="8"/>
            <span id="error-msg-password"></span>
            <span id="success-msg-password"></span>
            <button type="submit" class="primary-btn-s" id="update-btn">Spara</button>    
        </div>  

        <h3 style="margin-top: 3rem;">Ta bort ditt konto</h3>
        <div class="container">
            <p>När du tar bort ditt konto raderas all din data permanent och kan inte återskapas.</p>
            <button type="submit" class="secondary-btn-s" id="delete-acc-btn">Radera konto</button>
        </div>
    </form>
    <footer><p>&copy; Uppkopplad 2026</p></footer>
</body>

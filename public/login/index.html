<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="./login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
       <script src="./login.js" type="module"></script>
    <title>Login</title>
</head>
<body>
    <header>
        <nav class="nav-mobile">
        <a href="../index.html">
            <img src="../images/uppkopplad-logo.svg" alt="uppkoppladLogo" id="logo"/>
        </a>
        <a href="./index.html" class="primary-btn" id="auth-btn">Logga in</a>
    </nav>
    </header>
    
    <form id="login-form">
        <img src="../images/img_10.png" alt="login_img" id="log-img"/>
        <div class="container">
            <h4>Fyll i formuläret för att logga in</h4>

            <label for="username">Användarnamn: </label>
            <input type="text" placeholder="Fyll i ditt användarnamn" name="username" id="username" required>

            <div style="margin-top: 0.5rem;">
                <label for="password">Lösenord: </label>
                <div class="password-field">
                    <input type="password" placeholder="Fyll i ditt lösenord" name="password" id="password" required>
                    <button type="button" id="toggle-visibility" aria-label="Visa lösenord">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <span id="error-msg"></span>
            <button type="submit" class="primary-btn" id="big-login-btn" disabled>Logga in</button>
        </div>
    </form>    
 
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <form id="login-form">
    <h1>Logga in</h1>
    <div class="container">
        <p>Fyll i formuläret för att logga in</p>

        <label for="username">Användarnamn: </label>
        <input type="text" placeholder="Fyll i ditt Användarnamn" name="username" id="username" required>

        <label for="password">Lösenord: </label>
        <input type="password" placeholder="Fyll i ditt Lösenord" name="password" id="password" required>
        <button type="button" id="toggle-visibility" aria-label="Visa lösenord">👀</button>

        <button type="submit" class="login-btn">Logga in</button>
        
    </div>
    <div id="login-message"></div>
</form>
    <script src="./login.js"></script>
</body>
</html>

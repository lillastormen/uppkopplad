<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uppkopplad</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./quiz/quiz.css" />
    <script src="index.js" type="module" defer></script>
  </head>
  <body>
    <header>
      <div data-include="/nav.html"></div>
    </header>
    <main>
      <section id="quiz">
        <article id="quizResult">
          <h1 id="resultHeading"></h1>
          <p id="resultText"></p>
          <a href="./registration/index.html"
            ><button id="createAccountBtn" class="btn primary-btn">
              Skapa konto
            </button></a
          >
        </article>
        <form id="quizForm">
          <p id="numQuestion"></p>
          <section id="quizMainLayout">
            <p id="quizQuestion">Laddar quiz...</p>
            <article id="radios"></article>
            <article id="checkboxes"></article>
          </section>
          <button type="submit" id="quizSubmitBtn" class="btn primary-btn">
            Visa resultat
          </button>
          <button type="button" id="quizNextBtn" class="btn primary-btn">
            Skicka svar
          </button>
          <p id="noSelected">Välj ett alternativ</p>
        </form>
      </section>
    </main>
    <footer><p>&copy; Uppkopplad 2026</p></footer>
    <script src="includeHTML.js" type="module" defer></script>
  </body>
</html>

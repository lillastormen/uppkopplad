<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Uppkopplad</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="./quiz/quiz.css"/>
    <link rel="stylesheet" href="/account/account.css"/>
    <script src="./quiz/quiz.js" type="module" defer></script>
    <script src="/account/userAuth.js" type="module" defer></script>
    <script src="/account/account.js" type="module" defer></script>
  </head>
  <body>
    <header>
        <nav class="nav-mobile">
            <a href="../index.html">
                <img src="../images/uppkopplad-logo.svg" alt="uppkoppladLogo" id="logo"/>
            </a>
            <details class="secondary-btn menu-btn">
                <summary></summary>
                <div class="menu">
                    <div class="menu-options-box">
                        <a href="../account/index.html" class="secondary-btn menu-btn-s" style="margin: 0.5rem;">Mitt konto</a>
                        <a href="../modules/mainModules.html" class="secondary-btn menu-btn-s" style="margin: 0 0.5rem 0.5rem 0.5rem;">Moduler</a>
                          <a href="../statistic/index.html" class="secondary-btn menu-btn-s" style="margin: 0 0.5rem 0.5rem 0.5rem;">Översikt</a>
                        <a href="../login/index.html" class="primary-btn menu-btn-s" id="auth-btn" style="margin: 0 0.5rem 0.5rem 0.5rem;">Logga in</a>
                    </div>
                </div>
            </details>
        </nav>
    </header>

    <div id="hero-img-container">
      <img src="./images/heroxxx.png" id="hero-pic"/>
    </div>

    <main>
      <div id="hero-container">
        <h1>Din enkla väg in i den digitala världen</h1>
        <p style="margin-top: 0">
          Uppkopplad hjälper dig att känna dig självständig med moderna
          medier.<br/><br/>Börja ditt lärande genom att göra ett quiz.
        </p>
        <a href="#quizForm" class="primary-btn">Gör ett quiz</a>
      </div>

      <section id="quiz">
        <article id="quizResult">
          <h1 id="resultHeading"></h1>
          <p id="resultText"></p>
          <a
            href="./registration/index.html"
            id="createAccountBtn"
            class="primary-btn"
          >
            Skapa konto
          </a>
        </article>

        <form id="quizForm">
          <p id="numQuestion"></p>
          <section id="quizMainLayout">
            <p id="quizQuestion">Laddar quiz...</p>
            <article id="radios"></article>
            <article id="checkboxes"></article>
          </section>
          <button type="submit" id="quizSubmitBtn" class="primary-btn">
            Visa resultat
          </button>
          <button type="button" id="quizNextBtn" class="primary-btn">
            Skicka svar
          </button>
          <p id="noSelected">Välj ett alternativ</p>
        </form>
      </section>
    </main>
        <footer><p>&copy; Uppkopplad 2026</p></footer>
  </body>
</html>

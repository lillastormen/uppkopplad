<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uppkopplad</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="./quiz/quiz.css" />
    <script src="index.js" type="module" defer></script>
  </head>
  <body>
    <header>
      <nav class="nav-mobile">
        <a href="index.html">
          <img
            src="./images/uppkopplad_logo.svg"
            alt="uppkoppladLogo"
            id="logo"
          />
        </a>
      </nav>
    </header>
    <main>
      <section id="quiz">
        <p id="numQuestion"></p>
        <form id="quizForm">
          <section id="quizLayout">
            <p id="quizQuestion">Laddar quiz...</p>
            <article id="radios"></article>
            <article id="checkboxes"></article>
          </section>
          <button type="submit" id="quizSubmitBtn">Visa resultat</button>
          <button type="button" id="quizNextBtn">Skicka svar</button>
        </form>
        <p id="noSelected">Du har inte valt något alternativ</p>
      </section>
    </main>
    <footer><p>&copy; Uppkopplad 2026</p></footer>
  </body>
</html>

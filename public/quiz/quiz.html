<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uppkopplad - Quiz</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="quiz.css" />
    <script src="./quiz.js" type="module" defer></script>
  </head>
  <body>
    <header>
      <nav class="nav-mobile">
          <a href="/modules/mainModules.html">
          <img
            src="../images/uppkopplad-logo.svg"
            alt="uppkoppladLogo"
            id="logo"
          />
        </a>
        <a href="../login/index.html" class="primary-btn" id="auth-btn"
          >Logga in</a
        >
      </nav>
    </header>
    <main>
      <section id="quiz">
        <article id="quizResult">
          <h1 id="resultHeading"></h1>
          <p id="resultText"></p>
        </article>

        <form id="quizForm">
          <p id="numQuestion"></p>
          <section id="quizMainLayout">
            <p id="quizQuestion">Laddar quiz...</p>
            <article id="radios"></article>
            <article id="checkboxes"></article>
          </section>
          <button type="submit" id="quizSubmitBtn" class="primary-btn">
            Visa resultat
          </button>
          <button type="button" id="quizNextBtn" class="primary-btn">
            Skicka svar
          </button>
          <p id="noSelected">Välj ett alternativ</p>
        </form>
      </section>
    </main>
    <footer><p>&copy; Uppkopplad 2026</p></footer>
  </body>
</html>

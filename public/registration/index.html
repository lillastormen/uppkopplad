<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
</head>
<body>
    <form id="registration-form">
    <h1>Register</h1>
    <div class="container">
        <p>Fyll i formuläret för att skapa ditt konto</p>

        <label for="username">Användarnamn</label>
        <input type="text" placeholder="Fyll i ditt Användarnamn" name="username" id="username" required>

        <label for="password">Lösenord</label>
        <input type="password" placeholder="Fyll i ditt Lösenord" name="password" id="password" required>

        <label for="passwordRepeat">Lösenord</label>
        <input type="password" placeholder="Bekfräta ditt lösenord" name="passwordRepeat" id="passwordRepeat" required>

        <p>Genom att skapa ett konto accepterar du våra <a href="#">Användarvillkor och integritetspolicy</a>.</p>

        <button type="submit" class="registration-btn">Registera</button>
    </div>
    <div id="registration-message"></div>
</form>
<script src="./registration.js"></script>
</body>
</html>

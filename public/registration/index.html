<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="./registration.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <title>Registration</title>
  </head>
  
  <body>
    <header>
      <nav class="nav-mobile">
        <a href="../index.html">
          <img src="../images/uppkopplad-logo.svg" alt="uppkoppladLogo" id="logo"/>
        </a>
        <a href="../login/index.html" class="primary-btn" id="auth-btn">Logga in</a>
      </nav>
    </header>

    <main>
      <form id="registration-form">
    
                 <img src="../images/img_7.png" alt="registration_img" id="reg-img" />

 
        <div class="container">
          <h4>Fyll i formuläret för att skapa ditt konto</h4>
          <label for="username">Användarnamn: </label>
          <input type="text" placeholder="Fyll i ditt användarnamn" name="username" id="username" required/>
          <div style="margin-top: 0.5rem">
            <label for="password">Lösenord: </label>
            <div class="password-field">
              <input type="password" placeholder="Fyll i ditt lösenord" name="password" id="password" minlength="8" required/>
              <button type="button" id="toggle-visibility" aria-label="Visa lösenord">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          <label for="passwordRepeat">Bekräfta: </label>
          <input type="password" placeholder="Bekräfta ditt lösenord" name="passwordRepeat" id="passwordRepeat" minlength="8" required/>
          <span id="error-msg"></span>
          <div id="policy-container">
            <input type="checkbox" id="policy" name="policy" value="Policy" required/>
            <label for="policy" style="font-size: 14px;">Jag har läst och godkänner 
              <a href="../gdpr/index.html">användarvillkor och integritetspolicy</a>.
            </label>
          </div>

          <button type="submit" class="primary-btn" id="registration-btn">Registrera</button>
        </div>
      </form>
      
    </main>
    <footer><p>&copy; Uppkopplad 2026</p></footer>
    <script src="./registration.js" type="module"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="./registration.css">
    <title>Registration</title>
</head>
<body>
    <header>
           <div data-include="/nav.html"></div>
    </header>
    
    <form id="registration-form">
    <h1>Register</h1>
    <img src="/images/image_7.png" alt="registration_img" id="reg-img"/>
    <div class="container">
        <h4>Fyll i formuläret för att skapa ditt konto</h4>

        <label for="username">Användarnamn: </label>
        <input type="text" placeholder="Fyll i ditt Användarnamn" name="username" id="username" required>

        <label for="password">Lösenord: </label>
        <input type="password" placeholder="Fyll i ditt Lösenord" name="password" id="password" required>
        <button id="toggle-visibility" aria-label="Visa lösenord">ZZZZ</button>

        <label for="passwordRepeat">Bekfräta: </label>
        <input type="password" placeholder="Bekfräta ditt lösenord" name="passwordRepeat" id="passwordRepeat" required>

        <p>Genom att skapa ett konto accepterar du våra <a href="#">Användarvillkor och integritetspolicy</a>.</p>

        <button type="submit" class="primary-btn">Registera</button>
    </div>
    <div id="registration-message"></div>
</form>
<script src="./registration.js" type="module"></script>

</body>
</html>
